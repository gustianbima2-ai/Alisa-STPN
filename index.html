}.avatar-layer {

    <div id="loginOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 p-4">

    <script>
        // --- 1. Global Variables ---
        let batchFiles = [];
        let loadingBubble = null;
        const sessionId = "user_" + Math.random().toString(36).substring(7);
        const webhookUrl = 'https://alisa-n8n.duckdns.org/webhook/Alisa_stpn';

        const chatContainer = document.getElementById('chat-container');
        const textarea = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');

        // --- 2. UI Functions ---
        function toggleMenu() { document.getElementById('featureMenu').classList.toggle('hidden'); }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('featureMenu');
            if (!e.target.closest('button[onclick="toggleMenu()"]') && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });

        function triggerAction(type) {
            document.getElementById('featureMenu').classList.add('hidden');
            if (type === 'camera_ktp') document.getElementById('inputCameraKtp').click();
            else if (type === 'upload_ktp') document.getElementById('inputKtp').click();
            else if (type === 'camera_batas') document.getElementById('inputCameraBatas').click();
            else if (type === 'upload_batas') document.getElementById('inputBatas').click();
        }

function addMessage(text, isAi = false) {
    const chatContainer = document.getElementById('chat-container');
    const welcomeScreen = document.getElementById('welcome-screen');
    if (welcomeScreen) welcomeScreen.style.display = 'none';

    const wrapper = document.createElement('div');
    wrapper.className = isAi ? 'flex justify-start w-full mb-4' : 'flex justify-end w-full mb-4';

    const msgDiv = document.createElement('div');

if (isAi) {
    msgDiv.className = 'flex flex-col gap-3 glass-bubble-ai p-5 rounded-2xl max-w-[85%] shadow-sm animate-fade-in-up';

    // 1. Ubah **teks** menjadi <strong>
    let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    // 2. Ubah markdown image ![alt](url) menjadi tag HTML
    formattedText = formattedText.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:150px; border-radius:8px;">');

    // 3. Ubah newline (\n) menjadi <br>
    formattedText = formattedText.replace(/\n/g, '<br>');

    // 4. Tampilkan di chat
    msgDiv.innerHTML = `<div class="text-sm leading-relaxed text-stone-800">${formattedText}</div>`;

    // --- Voice AI (TTS) ---
    window.speechSynthesis.cancel();

    // Bersihkan teks asli dari hal-hal yang tidak perlu dibaca
    let cleanText = text
        .replace(/\*\*/g, '')                     // hapus **
        .replace(/<[^>]*>/g, '')                  // hapus tag HTML
        .replace(/#/g, '')                         // hapus #
        .replace(/!\[.*?\]\(.*?\)/g, ' foto ')     // ganti markdown gambar dengan " foto "
        .replace(/https?:\/\/[^\s]+/g, '');        // hapus semua URL

    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'id-ID';
utterance.onstart = () => {
    changeAvatar('menjawab.mp4', true).catch(e => console.log(e));
};
utterance.onend = () => {
    changeAvatar('diam.mp4', true).catch(e => console.log(e));
};
    window.speechSynthesis.speak(utterance);
    
    } else {
        // USER
        if (text.includes('<div')) {
            // Preview foto
            msgDiv.className = 'max-w-[80%] flex flex-col items-end';
            msgDiv.innerHTML = text;
        } else {
            // Teks biasa
            msgDiv.className = 'bg-primary text-white p-4 rounded-2xl max-w-[80%] shadow-lg';
            msgDiv.innerHTML = `<p class="text-sm font-medium">${text}</p>`;
        }
    }

    wrapper.appendChild(msgDiv);
    chatContainer.appendChild(wrapper);
    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
}
async function changeAvatar(fileName, loop = true) {
    const video1 = document.getElementById('avatar-video-1');
    const video2 = document.getElementById('avatar-video-2');
    
    // Tentukan video aktif dan berikutnya
    const activeVideo = video1.style.opacity == '1' ? video1 : video2;
    const nextVideo = activeVideo === video1 ? video2 : video1;
    
    // Set sumber dan loop
    nextVideo.src = fileName;
    nextVideo.loop = loop;
    
    // Tunggu sampai video siap dimainkan
    if (nextVideo.readyState < 3) { // HAVE_FUTURE_DATA
        await new Promise(resolve => {
            nextVideo.addEventListener('canplaythrough', resolve, { once: true });
        });
    }
    
    // Putar video berikutnya
    await nextVideo.play();
    
    // Lakukan transisi silang
    activeVideo.style.opacity = '0';
    nextVideo.style.opacity = '1';
    
    // Hentikan video yang tidak aktif setelah transisi
    setTimeout(() => {
        if (activeVideo.style.opacity == '0') {
            activeVideo.pause();
        }
    }, 300);
}
        // --- 3. Feature Functions (Geotagging & Batch) ---
async function previewFiles(input, label) {
    const files = Array.from(input.files);
    if (files.length === 0) return;

    for (const file of files) {
        let lat = "Tidak dibutuhkan";
        let lng = "Tidak dibutuhkan";

        // CEK: Hanya ambil GPS jika BUKAN KTP
        if (!label.toUpperCase().includes("KTP")) {
            const pos = await new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), {
                    enableHighAccuracy: true,
                    timeout: 5000
                });
            });

            lat = pos ? pos.coords.latitude : "Tidak terdeteksi";
            lng = pos ? pos.coords.longitude : "Tidak terdeteksi";
        }

        // Simpan ke antrean (batch)
        batchFiles.push({ file, lat, lng, label });

        // Tampilkan Preview
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = `
                <div class="flex flex-col gap-1 p-1 bg-white rounded-lg border border-primary/20 shadow-sm mb-2">
                    <img src="${e.target.result}" class="rounded-lg max-w-[150px] h-auto">
                    <div class="px-1 py-1">
                        <p class="text-[9px] font-bold text-primary uppercase">${label}</p>
                        ${!label.toUpperCase().includes("KTP") ? `<p class="text-[8px] text-gray-500 italic">Antrean [LOC: ${lat}, ${lng}]</p>` : ''}
                    </div>
                </div>`;
            addMessage(content, false);
        };
        reader.readAsDataURL(file);
    }

    // Tampilkan instruksi setelah upload
    if (files.length > 0) {
        if (label.includes("KTP")) {
            addMessage("Jika sudah mengirim, silakan ketik **'KTP'** untuk mengirim.", true);
        } else if (label.includes("Batas")) {
            addMessage("Jika semua patok sudah di foto/upload, silakan ketik **'Patok'** untuk mengirim.", true);
        }
    }

    input.value = "";
}

function showLoading() {
    const wrapper = document.createElement('div');
    wrapper.className = 'flex justify-start w-full mb-4 loading-bubble';
    wrapper.innerHTML = `<div class="glass-bubble-ai p-4 rounded-2xl flex items-center gap-2">
        <span class="material-symbols-outlined animate-spin text-primary">progress_activity</span>
        <span class="text-stone-600">ALISA sedang mengetik...</span>
    </div>`;
    chatContainer.appendChild(wrapper);
    loadingBubble = wrapper;
    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
}

function hideLoading() {
    if (loadingBubble) {
        loadingBubble.remove();
        loadingBubble = null;
    }
}
async function sendMessage() {
    const message = textarea.value.trim();
    
    // Jika tidak ada pesan dan tidak ada file, return
    if (!message && batchFiles.length === 0) return;

    // Jika tidak ada pesan tapi ada file, beri instruksi
    if (!message && batchFiles.length > 0) {
        const firstFile = batchFiles[0];
        if (firstFile.label.includes("KTP")) {
            addMessage("Silakan ketik **'KTP'** untuk mengirim foto KTP.", true);
        } else if (firstFile.label.includes("Batas")) {
            addMessage("Silakan ketik **'Patok'** untuk mengirim foto patok.", true);
        }
        return;
    }

    // Hentikan suara yang sedang berjalan
    window.speechSynthesis.cancel();
    changeAvatar('diam.mp4', true).catch(e => console.log(e)); 

    // Tampilkan pesan user
    if (message) addMessage(message, false);
    textarea.value = '';
    textarea.style.height = '52px';


    // Tampilkan loading
    showLoading();

    try {
        let response;
        if (batchFiles.length > 0) {
            // Tentukan keyword berdasarkan tipe file
            let keyword = null;
            if (batchFiles.some(item => item.label.includes("KTP"))) keyword = "ktp";
            else if (batchFiles.some(item => item.label.includes("Batas"))) keyword = "patok";

            // Jika pesan sesuai keyword, kirim dengan file
            if (keyword && message.toLowerCase() === keyword) {
                const formData = new FormData();
                let locTags = "";
                formData.append("sessionId", sessionId);
                batchFiles.forEach((item, i) => {
                    formData.append(`file_${i}`, item.file);
                    if (item.label.includes("Batas")) {
                        locTags += `[LOC: ${item.lat}, ${item.lng}] `;
                    }
                });
                const finalChatInput = locTags ? `${message} ${locTags}`.trim() : message;
                formData.append("chatInput", finalChatInput);
                response = await fetch(webhookUrl, { method: 'POST', body: formData });
                batchFiles = []; // Hapus file setelah terkirim
            } else {
                // Jika pesan tidak sesuai keyword, kirim hanya teks (file tetap disimpan)
                response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: message, sessionId: sessionId }),
                });
                // Beri tahu bahwa file masih pending
                addMessage("File masih tersimpan. Ketik **'KTP'** atau **'Patok'** untuk mengirim.", true);
            }
        } else {
            // Tidak ada file, kirim teks biasa
            response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: message, sessionId: sessionId }),
            });
        }
        const data = await response.json();
        addMessage(data.output || data.text || "Pesan terkirim.", true);
    } catch (error) {
        addMessage("Koneksi gagal.", true);
    } finally {
        hideLoading();
    }
}

        // --- 4. Speech Recognition ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            micBtn.onclick = () => {
                recognition.start();
                micBtn.classList.add('text-red-500', 'animate-pulse');
            };
            recognition.onresult = (e) => {
                textarea.value = e.results[0][0].transcript;
                sendMessage();
            };
            recognition.onend = () => micBtn.classList.remove('text-red-500', 'animate-pulse');
        }

        // --- 5. Event Listeners ---
        sendBtn.onclick = sendMessage;
        textarea.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
window.onload = () => {
    // Preload semua video yang mungkin digunakan
    ['menyapa.mp4', 'diam.mp4', 'menjawab.mp4'].forEach(src => {
        const vid = document.createElement('video');
        vid.src = src;
        vid.preload = 'auto';
        vid.style.display = 'none';
        document.body.appendChild(vid);
    });
    
    const video1 = document.getElementById('avatar-video-1');
    const video2 = document.getElementById('avatar-video-2');
    
    video1.src = 'menyapa.mp4';
    video1.loop = false;
    video1.style.opacity = '1';
    video1.play().catch(e => console.log(e));
    
    video2.src = 'diam.mp4';
    video2.loop = true;
    video2.style.opacity = '0';
    
    video1.onended = () => {
        changeAvatar('diam.mp4', true);
    };
};
        // --- 6. Admin Logic ---
        function openLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('loginOverlay').classList.add('hidden'); }
        function loginAdmin() {
            const nip = document.getElementById('loginNip').value;
            const pass = document.getElementById('loginPassword').value;
            if (nip === "stpn" && pass === "jaya") window.location.href = "https://alisa-n8n.duckdns.org/form/1a092e7f-4709-4399-af6d-d823ebaa9b00";
            else alert("Gagal");
        }
    </script>
